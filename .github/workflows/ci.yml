name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore src/Yatta.slnx

      - name: Build
        run: dotnet build src/Yatta.slnx --no-restore -c Release

      - name: Run tests
        run: dotnet test src/Yatta.slnx --no-build -c Release --verbosity normal
